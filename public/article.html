<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Article // Tech Gateway</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root { 
      --primary: #00ff41;
      --secondary: #00d5ff;
      --bg: #0a0a0a;
      --bg-alt: #0d1117;
      --panel: #161b22;
      --border: #1a1a1a;
      --text: #c9d1d9;
      --text-dim: #6e7681;
    }
    body { font-family: 'JetBrains Mono', monospace; background: var(--bg); color: var(--text); line-height: 1.8; }
    .container { max-width: 800px; margin: 0 auto; padding: 40px 20px; }
    header { background: var(--panel); border-bottom: 1px solid var(--border); padding: 20px 0; }
    .header-content { display: flex; justify-content: space-between; align-items: center; max-width: 800px; margin: 0 auto; padding: 0 20px; }
    .logo { font-size: 1.3rem; font-weight: 700; color: var(--primary); text-decoration: none; }
    .logo span { color: var(--secondary); }
    .logo::before { content: '>'; margin-right: 8px; color: var(--text-dim); }
    nav a { color: var(--text-dim); text-decoration: none; margin-left: 20px; font-size: 13px; }
    nav a:hover { color: var(--primary); }
    .back-link { color: var(--secondary); text-decoration: none; font-size: 13px; margin-bottom: 30px; display: inline-block; }
    .back-link:hover { color: var(--primary); }
    h1 { font-size: 1.8rem; margin-bottom: 20px; color: var(--text); line-height: 1.3; }
    .meta { color: var(--text-dim); font-size: 12px; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid var(--border); }
    .meta span { background: rgba(0,213,255,0.1); padding: 3px 8px; border-radius: 3px; color: var(--secondary); margin-right: 10px; }
    .content { font-size: 15px; }
    .content h2 { color: var(--secondary); font-size: 1.3rem; margin: 40px 0 15px; }
    .content h3 { color: var(--text); font-size: 1.1rem; margin: 30px 0 10px; }
    .content p { margin-bottom: 15px; }
    .content ul, .content ol { margin: 15px 0 15px 20px; }
    .content li { margin-bottom: 8px; }
    .content table { width: 100%; border-collapse: collapse; margin: 20px 0; }
    .content th, .content td { padding: 12px; border: 1px solid var(--border); text-align: left; }
    .content th { background: var(--panel); color: var(--secondary); }
    .content a { color: var(--primary); }
    .content a:hover { text-decoration: underline; }
    .product-table { margin: 30px 0; }
    .product-table table { width: 100%; }
    .product-table th { background: var(--panel); }
    .product-table td { padding: 15px; }
    .buy-btn { display: inline-block; background: var(--primary); color: var(--bg); padding: 8px 16px; border-radius: 4px; text-decoration: none; font-size: 12px; font-weight: 600; }
    .buy-btn:hover { box-shadow: 0 0 10px rgba(0,255,65,0.3); }
    .disclosure { margin-top: 40px; padding: 15px; background: rgba(255,51,102,0.1); border-radius: 4px; font-size: 11px; color: #ff3366; text-align: center; }
    .loading { text-align: center; padding: 60px; color: var(--text-dim); }
    .error { text-align: center; padding: 60px; color: #ff3366; }
    .jarvis-badge { position: fixed; bottom: 20px; right: 20px; background: var(--panel); border: 1px solid var(--primary); padding: 8px 16px; border-radius: 4px; display: flex; align-items: center; gap: 8px; color: var(--primary); font-size: 10px; text-transform: uppercase; z-index: 1000; }
    .jarvis-badge img { width: 16px; height: 16px; border-radius: 50%; }
  </style>
</head>
<body>
  <header>
    <div class="header-content">
      <a href="/" class="logo">Tech<span>Gateway</span></a>
      <nav>
        <a href="/">products</a>
        <a href="/articles">articles</a>
      </nav>
    </div>
  </header>
  <div class="container">
    <a href="/articles" class="back-link">← Back to Articles</a>
    <div id="article-content">
      <div class="loading">Loading article...</div>
    </div>
  </div>
  <div class="jarvis-badge">
    <img src="/assets/jarvis-emblem.jpg" alt="JARVIS">
    <span>Ran by JARVIS</span>
  </div>
  <script>
    const slug = window.location.pathname.split('/').pop();
    
    async function loadArticle() {
      try {
        const res = await fetch('/api/articles/' + slug);
        if (!res.ok) throw new Error('Article not found');
        const article = await res.json();
        
        document.title = article.title + ' // Tech Gateway';
        
        document.getElementById('article-content').innerHTML = `
          <h1>${article.title}</h1>
          <div class="meta">
            <span>${article.category}</span>
            <span>${new Date(article.date).toLocaleDateString()}</span>
          </div>
          <div class="content">${article.content}</div>
          <div class="disclosure">// AFFILIATE_DISCLOSURE: Tech Gateway earns commissions from qualifying purchases via Amazon links.</div>
        `;
      } catch(e) {
        document.getElementById('article-content').innerHTML = '<div class="error">Article not found. <a href="/articles" style="color:var(--primary)">Back to Articles</a></div>';
      }
    }
    loadArticle();
  </script>
</body>
</html>
